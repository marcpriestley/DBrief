<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- ── Theme bootstrap ───────────────────────────────────────────────────
         Step 1 (STYLE tag): Set dark background on html/body/#root as the
         absolute CSS default — no class, no variable, no external file.
         This fires as part of the initial CSS cascade, before ANY script or
         Vite bundle loads.  Light-mode override is handled by html.light below.

         Step 2 (SCRIPT tag): Reads localStorage, adds html.dark / html.light
         class, sets the inline style on <html> (highest specificity), and sets
         --pre-bg so the fill strips use the right colour.

         Together these mean: zero white frames, zero timing races. -->
    <style>
      /* Hard-code dark as the global default so WKWebView NEVER shows white
         before the Vite CSS bundle arrives.  html.light overrides to light.
         color-scheme tells WKWebView the colour to use for its OWN chrome:
         overscroll/rubber-band area, scrollbars, form controls.  Without this
         the overscroll zone shows iOS-default white on a Light Mode device. */
      html { background-color: #141414; color-scheme: dark; }
      body { background-color: #141414; }
      #root { background-color: #141414; }
      html.light,
      html.light body,
      html.light #root { background-color: #f7f7f7; }
      html.light { color-scheme: light; }
    </style>
    <script>
      try {
        var t = localStorage.getItem('dbrief_theme');
        var isDark = t !== 'light';
        document.documentElement.classList.add(isDark ? 'dark' : 'light');
        var bg = isDark ? '#141414' : '#f7f7f7';
        var cs = isDark ? 'dark' : 'light';
        // Inline styles — highest specificity, override ALL external CSS.
        document.documentElement.style.backgroundColor = bg;
        document.documentElement.style.colorScheme = cs;
        document.documentElement.style.setProperty('--pre-bg', bg);
        // Dynamically update theme-color so Safari status bar / browser chrome
        // matches the app background (not the amber default). Prevents a
        // visually jarring mismatch between the status bar zone and the app.
        var metaTheme = document.querySelector('meta[name="theme-color"]');
        if (metaTheme) metaTheme.setAttribute('content', bg);
      } catch (e) {
        document.documentElement.classList.add('dark');
        document.documentElement.style.backgroundColor = '#141414';
        document.documentElement.style.colorScheme = 'dark';
        document.documentElement.style.setProperty('--pre-bg', '#141414');
      }

      // ── Safe-area detection ─────────────────────────────────────────────
      // Capacitor's contentInset:'never' makes env(safe-area-inset-*) return 0
      // in CSS. We compensate with fallback px values — BUT ONLY when actually
      // running inside a native WKWebView (Capacitor), not in any browser.
      //
      // Detection: window.webkit.messageHandlers is injected by WKWebView
      // into every native Capacitor page. It is absent in all desktop and
      // mobile browsers. This is more reliable than window.screen.height
      // (which is >= 812 on most desktop monitors, causing fake bands in
      // browser previews and the Replit dev pane).
      try {
        var isWKWebView = (
          typeof window.webkit !== 'undefined' &&
          window.webkit !== null &&
          typeof window.webkit.messageHandlers !== 'undefined'
        );
        // Only Face ID iPhones have a home indicator (screen height >= 812 in
        // device-independent pixels). Older iPhones with Touch ID have a home
        // button so no home-indicator zone needs to be covered.
        var isFaceIdNative = isWKWebView && window.screen.height >= 812;
        var saibFallback   = isFaceIdNative ? '34px' : '0px';
        var saibTopFallback = isFaceIdNative ? '47px' : '0px';
        // max(env(), fallback): on native Capacitor where env()=0 this resolves
        // to the fallback; in a browser where env() returns the real value it
        // resolves to the real value (always >= fallback or both are 0).
        document.documentElement.style.setProperty(
          '--sai-bottom',
          'max(env(safe-area-inset-bottom, 0px), ' + saibFallback + ')'
        );
        document.documentElement.style.setProperty(
          '--sai-top',
          'max(env(safe-area-inset-top, 0px), ' + saibTopFallback + ')'
        );
      } catch (e) {
        document.documentElement.style.setProperty('--sai-bottom', 'env(safe-area-inset-bottom, 0px)');
        document.documentElement.style.setProperty('--sai-top', 'env(safe-area-inset-top, 0px)');
      }
    </script>
    <meta charset="UTF-8" />
    <!-- Force WKWebView to use dark native chrome for ALL system-rendered areas
         (safe zones, overscroll rubber-band, status bar background) so any
         native layer that we can't paint over shows dark rather than white. -->
    <meta name="color-scheme" content="dark" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>DBrief App - Daily Journaling App</title>
    <meta name="description" content="DBrief App is a daily journaling app with voice recording, customizable metric tracking, and AI-powered insights to help you understand patterns in your life." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DBrief App" />
    <meta name="theme-color" content="#f5a800" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/jpeg" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
    /* Safe-area fill strips: direct body children → always fixed to the
       physical viewport, never clipped by a scroll container (#root).
       --pre-bg is set synchronously by the theme <script> above, so colour
       is correct from the very first paint without any CSS-class dependency. */
    #dbrief-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background-color: hsl(0, 0%, 8%);
      /* Single GPU compositing layer — the entire splash (backdrop + logo) is
         one fixed element centred with flexbox.  Previously the inner wrapper
         was its own position:fixed element, which created a second compositing
         layer that could re-trigger an independent layout calculation during
         the opacity fade on WKWebView, causing the logo to visibly jump.
         Flexbox centering inside a single fixed div eliminates that entirely. */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
      will-change: opacity;
      transition: opacity 0.35s ease;
    }
    html:not(.dark) #dbrief-splash {
      background-color: hsl(0, 0%, 97%);
    }
    #dbrief-splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #dbrief-splash-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #dbrief-splash-logo {
      width: 110px;
      height: 110px;
      border-radius: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(245, 168, 0, 0.35);
      margin-bottom: 20px;
      background: #1a1a1a;
      flex-shrink: 0;
    }
    #dbrief-splash-name {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: hsl(0, 0%, 97%);
      letter-spacing: -0.5px;
    }
    html:not(.dark) #dbrief-splash-name {
      color: hsl(0, 0%, 8%);
    }
    #dbrief-splash-sub {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      margin-top: 6px;
      letter-spacing: 0.3px;
    }
    html:not(.dark) #dbrief-splash-sub {
      color: rgba(0,0,0,0.4);
    }
  </style>
  </head>
