<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Apply theme class synchronously before ANYTHING else renders.
         Without this, WKWebView shows a white flash (from :root light-mode vars)
         before React mounts and the ThemeProvider adds the .dark class. -->
    <script>
      try {
        var t = localStorage.getItem('dbrief_theme');
        var isDark = t !== 'light';
        document.documentElement.classList.add(isDark ? 'dark' : 'light');
        // Hard-set bg on html immediately so WKWebView shows the right colour
        // before any CSS loads — prevents the white-band flash at the bottom.
        var bg = isDark ? '#141414' : '#f7f7f7';
        document.documentElement.style.backgroundColor = bg;
        document.documentElement.style.setProperty('--pre-bg', bg);
      } catch (e) {
        document.documentElement.classList.add('dark');
        document.documentElement.style.backgroundColor = '#141414';
      }
    </script>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>DBrief - Daily Journaling App</title>
    <meta name="description" content="DBrief is a daily journaling app with voice recording, customizable metric tracking, and AI-powered insights to help you understand patterns in your life." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DBrief" />
    <meta name="theme-color" content="#f5a800" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/jpeg" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
    /* Safe-area fill strips: direct body children → always fixed to the
       physical viewport, never clipped by a scroll container (#root).
       Colors update instantly when html.dark is toggled. */
    #dbrief-top-fill,
    #dbrief-bottom-fill {
      position: fixed;
      left: 0;
      right: 0;
      pointer-events: none;
      z-index: 9999;
      background-color: hsl(0, 0%, 97%); /* light mode default */
    }
    html.dark #dbrief-top-fill,
    html.dark #dbrief-bottom-fill {
      background-color: hsl(0, 0%, 8%);  /* dark mode */
    }
    #dbrief-top-fill {
      top: 0;
      height: env(safe-area-inset-top);
    }
    #dbrief-bottom-fill {
      bottom: 0;
      /* max() so at least 34px even when env() reports 0 (Capacitor
         contentInset:'never' suppresses env values on some iOS builds) */
      height: max(env(safe-area-inset-bottom), 34px);
    }
    #dbrief-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: hsl(0, 0%, 8%);
      transition: opacity 0.35s ease;
      gap: 0;
    }
    html:not(.dark) #dbrief-splash {
      background-color: hsl(0, 0%, 97%);
    }
    #dbrief-splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #dbrief-splash-logo {
      width: 110px;
      height: 110px;
      border-radius: 26px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(245, 168, 0, 0.35);
      margin-bottom: 20px;
    }
    #dbrief-splash-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    #dbrief-splash-name {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: hsl(0, 0%, 97%);
      letter-spacing: -0.5px;
    }
    html:not(.dark) #dbrief-splash-name {
      color: hsl(0, 0%, 8%);
    }
    #dbrief-splash-sub {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      margin-top: 6px;
      letter-spacing: 0.3px;
    }
    html:not(.dark) #dbrief-splash-sub {
      color: rgba(0,0,0,0.4);
    }
  </style>
  </head>
  <body>
    <!-- Safe-area fill strips: outside #root so position:fixed is always
         relative to the WKWebView viewport, not a scroll container. -->
    <div id="dbrief-top-fill"></div>
    <div id="dbrief-bottom-fill"></div>
    <div id="dbrief-splash">
      <div id="dbrief-splash-logo">
        <img src="/dbrief-logo.jpeg" alt="DBrief" />
      </div>
      <div id="dbrief-splash-name">DBrief</div>
      <div id="dbrief-splash-sub">Your daily debrief</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
